server.port=8081

spring.application.name=reference-service

# Shared Shopizer schema (same MySQL as monolito / tax-service)
spring.jpa.properties.hibernate.default_schema=SALESMANAGER
spring.jpa.hibernate.use-new-id-generator-mappings=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/SALESMANAGER?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
spring.datasource.username=${DB_USER:shopizer}
spring.datasource.password=${DB_PASSWORD:very-long-shopizer-password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.ping.enabled=true

spring.main.allow-bean-definition-overriding=true
