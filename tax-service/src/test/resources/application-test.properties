server.port=0

spring.datasource.url=jdbc:h2:mem:tax;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS SALESMANAGER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=SALESMANAGER
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

authToken.header=Authorization
jwt.header=Authorization
jwt.secret=aSecret
jwt.expiration=604800

wave1.reference-service.base-url=http://localhost:18081
wave1.http.client.timeout-ms=2000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.ping.enabled=true

spring.main.allow-bean-definition-overriding=true
