server.port=8082

spring.application.name=tax-service

# Shared Shopizer schema (same MySQL as monolito / reference-service)
spring.jpa.properties.hibernate.default_schema=SALESMANAGER
spring.jpa.hibernate.use-new-id-generator-mappings=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/SALESMANAGER?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
spring.datasource.username=${DB_USER:shopizer}
spring.datasource.password=${DB_PASSWORD:very-long-shopizer-password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT — same secret as monolito (sm-core authentication.properties)
authToken.header=Authorization
jwt.header=Authorization
jwt.secret=${JWT_SECRET:aSecret}
jwt.expiration=${JWT_EXPIRATION:604800}

wave1.reference-service.base-url=${WAVE1_REFERENCE_BASE_URL:http://localhost:8081}
wave1.http.client.timeout-ms=${WAVE1_HTTP_TIMEOUT_MS:5000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.ping.enabled=true

spring.main.allow-bean-definition-overriding=true
