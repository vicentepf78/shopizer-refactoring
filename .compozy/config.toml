[defaults]
ide = "cursor-agent"
model = "grok-4.5"
auto_commit = true
access_mode = "full"
timeout = "60m"
max_retries = 2
retry_backoff_multiplier = 1.5

[tasks]
types = ["frontend", "backend", "docs", "test", "infra", "refactor", "chore", "bugfix"]

[tasks.run]
include_completed = false
recursive = false

[tasks.run.parallel]
max_concurrency = 4
